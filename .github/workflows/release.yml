name: CI and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - '[0-9]*'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 26.2.0
      publish:
        description: Upload validated bundle to Maven Central Portal
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  context:
    name: Release context
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.context.outputs.version }}
      publish: ${{ steps.context.outputs.publish }}
      publishing_type: ${{ steps.context.outputs.publishing_type }}
    steps:
      - uses: actions/checkout@v4

      - id: context
        name: Resolve version and publishing mode
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
        run: |
          set -euo pipefail

          source_version="$(
            sed -nE 's/^SET\(SEVENZIPJBINDING_VERSON[[:space:]]+"?([^" )]+)"?.*/\1/p' CMakeLists.txt | head -n1
          )"
          if [ -z "$source_version" ]; then
            echo "Could not resolve SEVENZIPJBINDING_VERSON from CMakeLists.txt" >&2
            exit 1
          fi

          version="$source_version"
          publish=false
          publishing_type=USER_MANAGED

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION:-$source_version}"
            publish="${INPUT_PUBLISH:-false}"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            publish=true
            publishing_type=AUTOMATIC
          fi

          if ! [[ "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release version must look like 26.2.0 or 26.2.0-rc1: $version" >&2
            exit 1
          fi

          if [ "$version" != "$source_version" ]; then
            echo "Release version $version does not match CMakeLists.txt version $source_version." >&2
            echo "Update source metadata before tagging or dispatching a different release version." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "publish=$publish"
            echo "publishing_type=$publishing_type"
          } >> "$GITHUB_OUTPUT"

          echo "version=$version"
          echo "publish=$publish"
          echo "publishing_type=$publishing_type"

  macos:
    name: macOS ${{ matrix.platform }}
    needs: context
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Mac-aarch64
            runner: macos-15
            java_arch: aarch64
          - platform: Mac-x86_64
            runner: macos-15-intel
            java_arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Zulu 8
        run: |
          JAVA_HOME="$(scripts/ci/install-zulu8-macos.sh)"
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: >
          cmake -S . -B build
          -DBUILD_TESTING=OFF
          -DJAVA_SYSTEM=Mac
          -DJAVA_ARCH=${{ matrix.java_arch }}

      - name: Build package
        run: |
          cmake --build build --parallel 3
          cmake --build build --target package

      - name: Smoke test
        run: scripts/ci/smoke-init.sh build/jbinding-java/sevenzipjbinding.jar "build/sevenzipjbinding-${{ matrix.platform }}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: build/sevenzipjbinding-${{ needs.context.outputs.version }}-${{ matrix.platform }}.zip
          if-no-files-found: error

  linux-native:
    name: Linux ${{ matrix.platform }}
    needs: context
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux-amd64
            runner: ubuntu-24.04
            java_arch: amd64
          - platform: Linux-arm64
            runner: ubuntu-24.04-arm
            java_arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential zip unzip

      - name: Configure
        run: >
          cmake -S . -B build
          -DBUILD_TESTING=OFF
          -DJAVA_SYSTEM=Linux
          -DJAVA_ARCH=${{ matrix.java_arch }}

      - name: Build package
        run: |
          cmake --build build --parallel "$(nproc)"
          cmake --build build --target package

      - name: Smoke test
        run: scripts/ci/smoke-init.sh build/jbinding-java/sevenzipjbinding.jar "build/sevenzipjbinding-${{ matrix.platform }}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: build/sevenzipjbinding-${{ needs.context.outputs.version }}-${{ matrix.platform }}.zip
          if-no-files-found: error

  linux-i386:
    name: Linux i386
    needs: context
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential gcc-multilib g++-multilib zip unzip

      - name: Configure
        run: >
          cmake -S . -B build
          -DBUILD_TESTING=OFF
          -DJAVA_SYSTEM=Linux
          -DJAVA_ARCH=i386
          -DCMAKE_C_FLAGS=-m32
          -DCMAKE_CXX_FLAGS=-m32
          -DCMAKE_SHARED_LINKER_FLAGS=-m32

      - name: Build package
        run: |
          cmake --build build --parallel "$(nproc)"
          cmake --build build --target package

      - uses: actions/upload-artifact@v4
        with:
          name: dist-Linux-i386
          path: build/sevenzipjbinding-${{ needs.context.outputs.version }}-Linux-i386.zip
          if-no-files-found: error

  linux-arm-cross:
    name: Linux ${{ matrix.platform }}
    needs: context
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux-armv5
            java_arch: armv5
            compiler_prefix: arm-linux-gnueabi
            packages: gcc-arm-linux-gnueabi g++-arm-linux-gnueabi
            flags: -march=armv5te
          - platform: Linux-armv6
            java_arch: armv6
            compiler_prefix: arm-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            flags: -march=armv6 -marm -mfloat-abi=hard -mfpu=vfp
          - platform: Linux-armv71
            java_arch: armv71
            compiler_prefix: arm-linux-gnueabihf
            packages: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            flags: -march=armv7-a -mfloat-abi=hard -mfpu=vfpv3-d16
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential zip unzip ${{ matrix.packages }}

      - name: Configure
        run: >
          cmake -S . -B build
          -DBUILD_TESTING=OFF
          -DCMAKE_SYSTEM_NAME=Linux
          -DJAVA_SYSTEM=Linux
          -DJAVA_ARCH=${{ matrix.java_arch }}
          -DCMAKE_C_COMPILER=${{ matrix.compiler_prefix }}-gcc
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler_prefix }}-g++
          -DCMAKE_C_FLAGS="${{ matrix.flags }}"
          -DCMAKE_CXX_FLAGS="${{ matrix.flags }}"

      - name: Build package
        run: |
          cmake --build build --parallel "$(nproc)"
          cmake --build build --target package

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: build/sevenzipjbinding-${{ needs.context.outputs.version }}-${{ matrix.platform }}.zip
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.platform }}
    needs: context
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows-amd64
            msystem: MINGW64
            mingw_package_arch: x86_64
            mingw_flag: MINGW64
            java_arch: amd64
            java_setup_arch: x64
          - platform: Windows-x86
            msystem: MINGW32
            mingw_package_arch: i686
            mingw_flag: MINGW32
            java_arch: x86
            java_setup_arch: x86
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'
          architecture: ${{ matrix.java_setup_arch }}

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          install: >-
            base-devel
            mingw-w64-${{ matrix.mingw_package_arch }}-cmake
            mingw-w64-${{ matrix.mingw_package_arch }}-gcc
            mingw-w64-${{ matrix.mingw_package_arch }}-make
            zip
            unzip

      - name: Configure
        shell: msys2 {0}
        run: >
          cmake -S . -B build -G "MinGW Makefiles"
          -DBUILD_TESTING=OFF
          -D${{ matrix.mingw_flag }}=Yes
          -DJAVA_SYSTEM=Windows
          -DJAVA_ARCH=${{ matrix.java_arch }}

      - name: Build package
        shell: msys2 {0}
        run: |
          cmake --build build --parallel 3
          cmake --build build --target package

      - name: Smoke test
        shell: msys2 {0}
        run: scripts/ci/smoke-init.sh build/jbinding-java/sevenzipjbinding.jar "build/sevenzipjbinding-${{ matrix.platform }}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: build/sevenzipjbinding-${{ needs.context.outputs.version }}-${{ matrix.platform }}.zip
          if-no-files-found: error

  bundle:
    name: Maven Central bundle
    needs:
      - context
      - macos
      - linux-native
      - linux-i386
      - linux-arm-cross
      - windows
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'

      - name: Assemble aggregate distributions
        working-directory: dist
        run: |
          ../scripts/build-multiplatform-release.sh --name AllWindows sevenzipjbinding-${{ needs.context.outputs.version }}-Windows-*.zip
          ../scripts/build-multiplatform-release.sh --name AllLinux sevenzipjbinding-${{ needs.context.outputs.version }}-Linux-*.zip
          ../scripts/build-multiplatform-release.sh --name AllMac sevenzipjbinding-${{ needs.context.outputs.version }}-Mac-*.zip
          ../scripts/build-multiplatform-release.sh sevenzipjbinding-${{ needs.context.outputs.version }}-*.zip

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
            echo "SKIP_GPG=0" >> "$GITHUB_ENV"
          else
            echo "No GPG_PRIVATE_KEY secret found; building unsigned dry-run bundle."
            echo "SKIP_GPG=1" >> "$GITHUB_ENV"
          fi

      - name: Build Central bundle
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: scripts/release/make-central-bundle.sh "${{ needs.context.outputs.version }}" dist "sevenzipjbinding-${{ needs.context.outputs.version }}-central-bundle.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: central-bundle
          path: sevenzipjbinding-${{ needs.context.outputs.version }}-central-bundle.zip
          if-no-files-found: error

      - name: Upload to Maven Central Portal
        if: ${{ needs.context.outputs.publish == 'true' }}
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PUBLISHING_TYPE: ${{ needs.context.outputs.publishing_type }}
        run: |
          if [ "$SKIP_GPG" = "1" ]; then
            echo "Refusing to publish unsigned bundle. Configure GPG_PRIVATE_KEY and GPG_PASSPHRASE secrets." >&2
            exit 1
          fi
          scripts/release/publish-central.sh "sevenzipjbinding-${{ needs.context.outputs.version }}-central-bundle.zip" "sevenzipjbinding-${{ needs.context.outputs.version }}"
